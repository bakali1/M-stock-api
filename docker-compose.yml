services:
  db:
    image: ${POSTGRES_IMAGE:-postgres:15}
    container_name: ${POSTGRES_CONTAINER_NAME:-mstock-postgres}
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mstock}
      POSTGRES_USER: ${POSTGRES_USER:-bakali}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-bakali}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - ./volumes/postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bakali -d mstock"]
      interval: 5s
      timeout: 3s
      retries: 30
